<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arya_San - Welcome</title>
    <link href="" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            background:
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                url("https://media.baosonla.org.vn/public/hieupt/2026-01-20/28.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(79, 140, 255, 0.3);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #4f8cff;
            padding: 5px;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(79, 140, 255, 0.5);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            text-transform: lowercase;
        }

        .subtitle {
            color: #c9d1d9;
            margin: 8px 0 25px;
            font-size: 14px;
        }

        .stats {
            margin-bottom: 25px;
        }

        .stats span {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #4f8cff;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login {
            background: transparent;
            border: 2px solid #4f8cff;
            color: #4f8cff;
        }

        .register {
            background: #4f8cff;
            color: white;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(79, 140, 255, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="avatar">
            <img src="" alt="avatar">
        </div>
        <h1>arya_san</h1>
        <div class="subtitle">Chào mừng đến với trung học cơ sở MỘC LỴ  </div>

        <div class="stats">
            <span>Wed hỗ trợ giáo viên </span>
        </div>

        <div class="buttons">
            <!-- Sử dụng đường dẫn tương đối ./ để tránh lỗi GET -->
            <button class="login" onclick="location.href='./dangnhap123.html'">Đăng nhập</button>
            <button class="register" onclick="location.href='./dangki123.html'">Đăng ký</button>
        </div>
    </div>

        // Kiểm tra đăng nhập ngay khi trang tải xong
        window.onload = function () {
            if (localStorage.getItem("currentUser")) {

            }
        };
    </script>
</body>
